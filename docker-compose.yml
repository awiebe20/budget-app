version: '3.8'

services:
  backend:
    build: ./backend
    container_name: budget_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: "file:./budget.db"
      PORT: 3001
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    container_name: budget_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
